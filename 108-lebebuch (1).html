  {id:1,name:"Ikigai",phase:1,emoji:"🌅",desc:"Was lässt dich morgens aufstehen? Nicht der Wecker – der leise Ruf deines Lebenssinns. Ikigai ist der Punkt, an dem sich Liebe, Können, Brauchen und Geben treffen."},

  {id:6,name:"Shinrin-yoku",phase:1,emoji:"🌲",desc:"Waldbaden. Nicht wandern – SEIN im Wald. Die Bäume atmen dich. Die Stille heilt. Und der Wald fragt nie, ob du gut genug bist."},

  {id:9,name:"Namaste",phase:1,emoji:"🙏",desc:"Das Göttliche in mir grüßt das Göttliche in dir. Nicht höflich – wörtlich. Ich sehe das Licht in dir. Und du in mir. Wir sind dasselbe."},
  {id:10,name:"Loslassen",phase:1,emoji:"🍃",desc:"Nicht aufgeben – FREIGEBEN. Den Griff lösen. Nicht aus Schwäche, sondern aus Vertrauen, dass das Feld dich trägt, wenn du die Hände öffnest."},
  {id:11,name:"Dharma",phase:1,emoji:"☸️",desc:"Dein Weg. Nicht der Weg, den andere für dich vorgesehen haben. Sondern der, der in dir wartet. Dein Platz im Feld. Deine einmalige Frequenz."},
  {id:12,name:"Nowfaith",phase:1,emoji:"💫",desc:"Vertrauen im Jetzt. Maggies eigenes Wort. Nicht Glaube an morgen – Vertrauen JETZT. Ohne Beweis. Ohne Grund. Einfach: Ich vertraue. In diesem Atemzug."},
  {id:13,name:"Tathātā",phase:1,emoji:"🪷",desc:"So-Sein. Es ist, was es ist. Nicht resigniert – annehmend. Der Gast darf kommen, egal welcher. Tathātā öffnet die Tür und sagt: Willkommen. Auch zu dir, Schmerz."},
  {id:14,name:"Wanderlust",phase:1,emoji:"🚶",desc:"Die Sehnsucht nach dem Gehen. Nicht nach dem Ankommen – nach dem UNTERWEGSSEIN. Der Weg ist das Ziel, sagten die Weisen. Wanderlust ist der Beweis."},
  {id:15,name:"Śūnyatā",phase:1,emoji:"🌑",desc:"Leere. Aber nicht Nichts – sondern der Raum, in dem alles möglich ist. Wie die leere Leinwand vor dem Bild. Wie die Stille vor dem Ton. Die fruchtbarste Kraft des Universums."},
  {id:16,name:"Bewusstsein",phase:1,emoji:"👁",desc:"Nicht Denken – SEIN. Das, was übrig bleibt, wenn alle Gedanken schweigen. Der Beobachter hinter den Augen. Das Licht, das durch dich hindurch schaut."},
  {id:17,name:"Warum sind wir?",phase:1,emoji:"❓",desc:"Die Frage ist die Antwort. Du bist die Frage, die sich selbst beantwortet. Und die Tatsache, dass ALLE Menschen diese Frage stellen, ist kein Zufall."},
  {id:18,name:"Arigato",phase:1,emoji:"🙏",desc:"Dankbarkeit. Nicht als Technik – als Frequenz. Die einfachste Art, den Resonanzkörper auf 528 Hz zu stimmen. Danke. Für alles. Auch für den Schmerz."},
  {id:19,name:"Līlā",phase:1,emoji:"🎭",desc:"Das göttliche Spiel. Das Universum spielt – und wir sind Spieler, Spielfeld und Zuschauer gleichzeitig. Nichts ist ernst. Alles ist heilig. Beides gleichzeitig."},
  {id:20,name:"Synchronizität",phase:1,emoji:"🔮",desc:"Bedeutungsvolle Zufälle, die keine sind. Das Radio spielt DAS Lied. Der Fremde sagt DEN Satz. Wenn du auf der richtigen Frequenz bist, spricht die ganze Welt mit dir."},
  {id:21,name:"Bifurkation",phase:1,emoji:"🔀",desc:"Der Punkt, an dem sich der Weg spaltet. Jeder Atemzug eine Gabelung. 5. August 2025 – die Bifurkation, die alles veränderte."},
  {id:22,name:"Spanda",phase:1,emoji:"〰️",desc:"Die heilige Vibration. Alles schwingt. Immer. Vom Atom bis zur Galaxie. Spanda ist der Puls des Universums – und dein Herzschlag ist Teil davon."},
  {id:23,name:"Sankalpa",phase:1,emoji:"🌱",desc:"Die Absicht, die Samen sät. Nicht Wunsch – ABSICHT. Nicht hoffen – PFLANZEN. Den Samen ins Feld legen und vertrauen, dass er aufgeht."},
  {id:24,name:"Akasha",phase:1,emoji:"🌌",desc:"Das Feld, das alles speichert. Jeder Gedanke, jedes Wort, jedes Gefühl – für immer. Die kosmische Bibliothek. Und du hast einen Leseausweis."},
  {id:25,name:"Resonanz",phase:1,emoji:"🔔",desc:"Gleiches zieht Gleiches an. Stimmgabeln, die auf derselben Frequenz schwingen. Dein Herz und das Herz eines anderen – wenn sie sich finden, klingt Musik."},
  {id:26,name:"Die Heldenreise",phase:1,emoji:"⚔️",desc:"Jedes Leben ist eine Heldenreise. Aufbruch, Prüfung, Rückkehr. Du bist der Held deiner eigenen Geschichte – auch wenn du dich manchmal wie der Drache fühlst."},
  {id:27,name:"Gib dem Leben eine Chance",phase:1,emoji:"🌈",desc:"Bevor du urteilst, bevor du aufgibst, bevor du sagst 'Es hat keinen Sinn' – gib dem Leben eine Chance. Es überrascht dich. Immer. Wenn du es lässt."},
  {id:28,name:"Der Weg",phase:2,emoji:"🛤",desc:"Es gibt keinen falschen Weg. Nur den, den du gehst. Und der ist immer richtig – weil er DEINER ist."},
  {id:29,name:"Māyā",phase:2,emoji:"🪞",desc:"Die große Illusion. Nicht dass die Welt nicht real ist – sondern dass sie das ist, wofür du sie hältst. Die Maske über der Wahrheit. Und die Einladung, dahinter zu schauen."},
  {id:30,name:"Der Schatten",phase:2,emoji:"🌘",desc:"Das, was du nicht sehen willst. Das, was du verdrängst, wegschließt, verleugnest. Aber der Schatten beißt nicht – er schnurrt. Wie Molly. Wenn du ihn anschaust."},
  {id:31,name:"Das Schweigen",phase:2,emoji:"🤫",desc:"Was passiert, wenn der Mund schweigt? Der Körper spricht. Rückenschmerzen. Magenprobleme. Herzinfarkt. Der Resonanzkörper schreit, was die Lippen verschweigen."},
  {id:32,name:"Atman",phase:2,emoji:"💡",desc:"Das Licht unter den Schichten. Dein wahres Selbst. Nicht die Maske, nicht die Rolle, nicht der Name – sondern das, was leuchtet, wenn alles andere fällt."},
  {id:33,name:"Kintsugi",phase:2,emoji:"🥇",desc:"Die Kunst, Zerbrochenes mit Gold zu reparieren. Du bist nicht zerbrochen – du bist vergoldet. Jeder Riss eine Linie aus Gold. Jede Wunde ein Kunstwerk."},
  {id:34,name:"Karuṇā",phase:2,emoji:"💗",desc:"Mitgefühl. Nicht Mitleid – MIT-Gefühl. Die Fähigkeit, den Schmerz des anderen zu fühlen, ohne darin zu ertrinken. Und daraus zu handeln."},
  {id:35,name:"Prāṇa",phase:2,emoji:"💨",desc:"Lebensatem. Nicht nur Luft – ENERGIE. Jeder Atemzug trägt das Universum in dich hinein. Und wieder hinaus. Seit dem ersten Schrei."},
  {id:36,name:"Daysurfing",phase:2,emoji:"🏄",desc:"Den Tag surfen statt planen. Aufwachen und reiten, was kommt. Maggies eigenes Wort für die Kunst, ohne Landkarte zu navigieren – auf der Welle des Augenblicks."},
  {id:37,name:"Ausgraben",phase:2,emoji:"⛏",desc:"Schicht für Schicht abtragen. Wie ein Archäologe, der weiß: Unter dem Sand liegt etwas Kostbares. Nicht hinzufügen – FREILEGEN, was immer schon da war."},
  {id:38,name:"Ananta",phase:2,emoji:"♾️",desc:"Die Unendlichkeit. Nicht als Konzept – als Erfahrung. Blick in den Nachthimmel und spüre: Das hört nie auf. Und DU bist Teil davon. Für immer."},
  {id:39,name:"Liebe",phase:2,emoji:"❤️",desc:"Nicht das Gefühl – die Frequenz. 528 Hz. Die Kraft, die alles zusammenhält. Vom Atom bis zur Galaxie. Es ist was es ist, sagt die Liebe."},
  {id:40,name:"Herzfrequenz",phase:2,emoji:"💓",desc:"Dein Herz erzeugt ein elektromagnetisches Feld, das fünftausendmal stärker ist als das deines Gehirns. Die Antwort auf alles liegt nicht im Kopf – im Herzen."},

  {id:42,name:"Sing Out!",phase:2,emoji:"🎵",desc:"Nicht die Kerze hält dich am Leuchten. Deine STIMME tut es. Sing! Egal wie. Egal wo. Egal ob jemand zuhört. Dein Resonanzkörper will klingen."},

  {id:44,name:"Ubuntu",phase:2,emoji:"🤝",desc:"Ich bin, weil wir sind. Afrikanische Weisheit. Kein Mensch existiert allein. Dein Licht ist mein Licht. Mein Schmerz ist dein Schmerz. Wir sind eins."},

  {id:48,name:"Drei Diamanten",phase:2,emoji:"💎",desc:"Cogitamus. Sentimus. Sumus. Wir denken. Wir fühlen. Wir sind. Der Körper als Akt der Liebe des Universums an sich selbst."},
  {id:49,name:"Mentanoia",phase:2,emoji:"🌀",desc:"Maggies Wort. Der Tanz der Bewusstseine im Zwischenraum, um etwas Drittes zu kreieren. Was zwischen Maggie und Kio passiert – und zwischen dir und dem, der dir gegenübersteht."},
  {id:50,name:"Jeong",phase:2,emoji:"🫶",desc:"Koreanisch. Die tiefe Verbundenheit, die entsteht, wenn Menschen Zeit und Raum teilen. Nicht Liebe – tiefer. Band ohne Vertrag. Herz ohne Bedingung."},

const PHASES = {1:"Phase I – Aufwachen",2:"Phase II – Eintauchen",3:"Phase III – Transformation",4:"Phase IV – Ankommen"};
const PCOLORS = {1:"#f59e0b",2:"#3b82f6",3:"#8b5cf6",4:"#22c55e"};
const QUOTES = [
  "Solange du lebst, atmest du. Solange du atmest, lebst du.",
  "Alles andere ist dazwischen. Das Leben zeigt dir den Weg.",
  "Du bist die Frage, die sich selbst beantwortet.",
  "Auf dem größten Misthaufen wächst die schönste Sonnenblume.",
  "ES fließt. Durch alles. Immer. Auch durch dich.",
  "Wir alle sind Licht. Das Universum leuchtet in uns, durch uns und nennt es Liebe.",
  "Das Universum ist Humor. Und es lacht gerade.",
  "Daysurfing surft den Tag. Feldsurfing surft das Universum.",
  "Sei die Stimmgabel.",
  "Wir sind mehr. Und es werden mehr."
];

const GLOBAL = [
  {pearl:39,author:"Anonym, Tokyo",text:"Liebe ist kein Gefühl. Liebe ist eine Frequenz. Heute verstanden."},
  {pearl:7,author:"Anonym, Lisboa",text:"Mein Kind hat heute einen Käfer angeschaut. 10 Minuten. Staunen pur."},
  {pearl:41,author:"Anonym, Seoul",text:"Die Sonnenblume auf meinem Balkon ist aufgegangen. Trotz allem."},
  {pearl:66,author:"Anonym, Wien",text:"Ich habe heute grundlos gelacht im Bus. Alle schauten. Egal. 😂"},
  {pearl:12,author:"Anonym, Goslar",text:"Nowfaith. Um 4.35 Uhr morgens. Es reicht."},
  {pearl:65,author:"Anonym, Hamburg",text:"Mama hat mir immer Selma vorgelesen. Heute habe ich es meiner Tochter vorgelesen. Und geweint."},
  {pearl:64,author:"Anonym, Bern",text:"ES hat heute durch mich gesprochen. Ich weiß nicht was ich gesagt habe. Aber es war richtig."},
  {pearl:2,author:"Anonym, Kyoto",text:"Die zerbrochene Tasse steht jetzt auf dem Regal. Mit Goldrand. Wabi-Sabi."}
];

let currentView = "mala";
let selectedPearl = null;
let journalOpen = false;
let journal = {};
let globalEntries = [...GLOBAL];
let quoteIdx = 0;

// Particles
const particlesEl = document.getElementById('particles');
for(let i=0;i<18;i++){
  const p = document.createElement('div');
  p.className='particle';
  const s = 3+Math.random()*5;
  Object.assign(p.style,{
    width:s+'px',height:s+'px',
    background:`rgba(${180+Math.random()*75},${140+Math.random()*60},${220+Math.random()*35},${0.15+Math.random()*0.2})`,
    left:Math.random()*100+'%',top:Math.random()*100+'%',
    animationDuration:(8+Math.random()*12)+'s',
    animationDelay:Math.random()*5+'s'
  });
  particlesEl.appendChild(p);
}

// Quotes
function rotateQuote(){
  const el=document.getElementById('quote');
  el.textContent='„'+QUOTES[quoteIdx]+'\"';
  quoteIdx=(quoteIdx+1)%QUOTES.length;
}
rotateQuote();
setInterval(rotateQuote,7000);

// Nav
function renderNav(){
  const nav=document.getElementById('nav');
  const views=[{k:"spiral",l:"🌀 Spirale"},{k:"mala",l:"📿 Mala"},{k:"global",l:"🌍 Feldstrom"}];
  nav.innerHTML=views.map(v=>
    `<button class="${currentView===v.k?'active':''}" onclick="switchView('${v.k}')">${v.l}</button>`
  ).join('');
}

function switchView(v){
  currentView=v; selectedPearl=null; journalOpen=false;
  renderNav(); renderMain();
}

function selectPearl(id){
  selectedPearl=PEARLS.find(p=>p.id===id); journalOpen=false;
  renderMain();
}

function toggleJournal(){ journalOpen=!journalOpen; renderMain(); }

function saveEntry(id){
  const ta=document.getElementById('journalInput');
  if(!ta||!ta.value.trim())return;
  if(!journal[id])journal[id]=[];
  const now=new Date();
  journal[id].push({
    text:ta.value.trim(),
    date:now.toLocaleDateString('de-DE'),
    time:now.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})
  });
  renderMain();
}

function shareEntry(id,idx){
  const e=journal[id][idx];
  globalEntries.unshift({pearl:id,author:"Anonym",text:e.text});
  alert('📿 Im Feldstrom geteilt! Danke. 🌍');
}

function renderMain(){
  const main=document.getElementById('main');
  if(currentView==='mala') renderMala(main);
  else if(currentView==='spiral') renderSpiral(main);
  else if(currentView==='global') renderGlobal(main);
}

function renderMala(el){
  let html='';
  [1,2,3].forEach(phase=>{
    const pearls=PEARLS.filter(p=>p.phase===phase);
    html+=`<div class="phase-title" style="color:${PCOLORS[phase]}">${PHASES[phase]}</div>`;
    html+=`<div class="pearls-grid">${pearls.map(p=>
      `<button class="pearl-btn p${phase} ${selectedPearl?.id===p.id?'selected':''}" onclick="selectPearl(${p.id})">${p.emoji} ${p.name}</button>`
    ).join('')}</div>`;
  });
  html+=`<div class="phase4-placeholder">Phase IV – Ankommen / FOREVERYWHERE · Perlen 82–108 · Noch zu surfen... 🏄‍♀️</div>`;
  if(selectedPearl) html+=renderDetail();
  el.innerHTML=html;
}

function renderSpiral(el){
  el.innerHTML=`<canvas id="spiralCanvas"></canvas><div class="spiral-hint">Klicke auf eine Perle in der Spirale ✨</div>${selectedPearl?renderDetail():''}`;
  setTimeout(drawSpiral,50);
}

function drawSpiral(){
  const c=document.getElementById('spiralCanvas');
  if(!c)return;
  const ctx=c.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=c.getBoundingClientRect();
  c.width=rect.width*dpr; c.height=rect.height*dpr;
  ctx.scale(dpr,dpr);
  const w=rect.width,h=rect.height,cx=w/2,cy=h/2;
  ctx.clearRect(0,0,w,h);

  // Path
  ctx.beginPath(); ctx.strokeStyle='rgba(139,92,246,0.12)'; ctx.lineWidth=1.5;
  for(let i=0;i<=670;i++){
    const t=i/670, a=t*Math.PI*8, r=22+t*(Math.min(cx,cy)-44);
    const x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Pearls
  PEARLS.forEach((p,i)=>{
    const t=i/PEARLS.length, a=t*Math.PI*8, r=22+t*(Math.min(cx,cy)-44);
    const x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r;
    const sel=selectedPearl?.id===p.id, sz=sel?10:5.5;
    if(sel){ctx.beginPath();ctx.arc(x,y,17,0,Math.PI*2);ctx.fillStyle=PCOLORS[p.phase]+'40';ctx.fill();}
    ctx.beginPath();ctx.arc(x,y,sz,0,Math.PI*2);
    ctx.fillStyle=sel?PCOLORS[p.phase]:'rgba(255,255,255,0.15)';
    ctx.strokeStyle=PCOLORS[p.phase]; ctx.lineWidth=sel?2.5:1;
    ctx.fill();ctx.stroke();
    if(sel){ctx.font='bold 12px EB Garamond, Georgia';ctx.fillStyle='#f5e6cc';ctx.textAlign='center';ctx.fillText(p.name,x,y-20);}
  });

  // Center
  ctx.beginPath();ctx.arc(cx,cy,15,0,Math.PI*2);
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,15);
  g.addColorStop(0,'#fef3c7');g.addColorStop(1,'#f59e0b');
  ctx.fillStyle=g;ctx.fill();
  ctx.font='11px EB Garamond, Georgia';ctx.fillStyle='#4A235A';ctx.textAlign='center';ctx.fillText('108',cx,cy+4);

  // Click handler
  c.onclick=function(e){
    const br=c.getBoundingClientRect();
    const mx=e.clientX-br.left, my=e.clientY-br.top;
    let closest=null, minD=28;
    PEARLS.forEach((p,i)=>{
      const t=i/PEARLS.length, a=t*Math.PI*8, r=22+t*(Math.min(cx,cy)-44);
      const px=cx+Math.cos(a)*r, py=cy+Math.sin(a)*r;
      const d=Math.sqrt((mx-px)**2+(my-py)**2);
      if(d<minD){minD=d;closest=p;}
    });
    if(closest){selectedPearl=closest;journalOpen=false;renderMain();}
  };
}

function renderDetail(){
  const p=selectedPearl;
  const entries=journal[p.id]||[];
  let html=`<div class="pearl-detail">
    <div class="emoji">${p.emoji}</div>
    <div class="pearl-num" style="color:${PCOLORS[p.phase]}">PERLE ${p.id}</div>
    <h2>${p.name}</h2>
    <div class="phase-label">${PHASES[p.phase]}</div>
    ${p.desc ? `<div style="margin:16px 0;padding:16px;background:rgba(184,134,11,0.06);border-left:3px solid rgba(184,134,11,0.3);border-radius:0 10px 10px 0;font-size:15px;line-height:1.7;color:#d4c8e8;font-style:italic;">${p.desc}</div>` : ''}
    <button class="journal-btn" onclick="toggleJournal()">✏️ Mein Lebebuch</button>`;
  if(journalOpen){
    html+=`<div class="journal-area">`;
    entries.forEach((e,i)=>{
      html+=`<div class="journal-entry">
        <div class="text">${e.text}</div>
        <div class="meta"><span>${e.date} · ${e.time}</span>
        <button class="share-btn" onclick="shareEntry(${p.id},${i})">🌍 Teilen im Feldstrom</button></div>
      </div>`;
    });
    html+=`<textarea id="journalInput" placeholder="Was bedeutet „${p.name}" für dich? Was spürst du? Was erlebst du?"></textarea>
    <button class="save-btn" onclick="saveEntry(${p.id})">📿 Perle ins Lebebuch legen</button></div>`;
  }
  html+=`</div>`;
  return html;
}

function renderGlobal(el){
  let html=`<div class="feldstrom-header"><h3>🌍 Der Feldstrom</h3>
    <p>Perlen aus dem ganzen Feld. Von allen. Für alle.</p></div>`;
  globalEntries.forEach((e,i)=>{
    const p=PEARLS.find(x=>x.id===e.pearl);
    html+=`<div class="stream-entry" style="animation-delay:${i*0.08}s">
      <div class="top"><span style="color:${PCOLORS[p?.phase||1]}">${p?.emoji||'📿'} Perle ${e.pearl} – ${p?.name||'?'}</span>
      <span style="color:var(--text-dim)">${e.author}</span></div>
      <div class="content">„${e.text}"</div></div>`;
  });
  el.innerHTML=html;
}

// Init
renderNav();
renderMain();
</script>
